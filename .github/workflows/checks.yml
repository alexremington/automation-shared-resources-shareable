name: Checks

on:
  push:
  pull_request:

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Run checks
        run: npm run check
